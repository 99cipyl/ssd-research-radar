name: Sync and publish SSD Research Radar

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - radar.py
      - briefs.py
      - evidence.py
      - item_page.py
      - retention.py
      - sources.json
      - cloud/**
      - tests/**
      - .github/workflows/publish-radar.yml
  schedule:
    # Offset from the top of the hour because GitHub reports heavier queueing
    # there. GitHub schedules are best-effort, not real-time guarantees.
    - cron: "7,22,37,52 * * * *"
    # Academic indexes are much slower and do not change minute by minute.
    - cron: "11 3 * * *"
    # Explicit full rescan covers delayed academic indexing once a month.
    - cron: "23 4 1 * *"

concurrency:
  group: ssd-research-radar-production
  cancel-in-progress: false

env:
  PUBLIC_BASE_URL: https://99cipyl.github.io/ssd-research-radar/
  RADAR_PUBLIC_BASE_URL: https://99cipyl.github.io/ssd-research-radar/

jobs:
  sync-and-build:
    permissions:
      contents: write
      pages: write
      models: read
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
      GROUPS_IO_API_KEY: ${{ secrets.GROUPS_IO_API_KEY }}
    outputs:
      sync_exit: ${{ steps.sync.outputs.exit_code }}
      source_failure_count: ${{ steps.sync.outputs.source_failure_count }}
      brief_failure_count: ${{ steps.sync.outputs.brief_failure_count }}
      state_changed: ${{ steps.compare.outputs.changed }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run regression tests before touching production state
        run: |
          python3 -m unittest discover -s tests -q
          python3 -m py_compile radar.py briefs.py evidence.py item_page.py retention.py cloud/*.py

      - name: Restore durable state branch
        id: restore
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          if git fetch --depth=1 origin "+refs/heads/radar-state:refs/remotes/origin/radar-state"; then
            if git cat-file -e "refs/remotes/origin/radar-state:radar.sqlite3"; then
              git show "refs/remotes/origin/radar-state:radar.sqlite3" > data/radar.sqlite3
              python3 cloud/state_db.py verify data/radar.sqlite3
              echo "restored=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::radar-state exists but radar.sqlite3 is missing"
              exit 1
            fi
          else
            echo "No radar-state branch yet; the first run will establish the history baseline."
            echo "restored=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fingerprint material state before sync
        id: before
        shell: bash
        run: |
          set -euo pipefail
          value=$(python3 cloud/state_db.py fingerprint data/radar.sqlite3)
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "Before: $value"

      - name: Select rate-appropriate source set
        id: mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$EVENT_NAME" == "push" ]]; then
            mode=manual
            full=false
          elif [[ "$EVENT_SCHEDULE" == "11 3 * * *" ]]; then
            mode=academic
            full=false
          elif [[ "$EVENT_SCHEDULE" == "23 4 1 * *" ]]; then
            mode=monthly
            full=true
          else
            mode=frequent
            full=false
          fi
          python3 cloud/prepare_sync.py --mode "$mode"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "full=$full" >> "$GITHUB_OUTPUT"

      - name: Synchronize sources
        id: sync
        shell: bash
        env:
          GITHUB_MODELS_TOKEN: ${{ github.token }}
          RADAR_BRIEF_MODEL: openai/gpt-4.1-mini
          RADAR_BRIEF_BATCH_SIZE: 2
          RADAR_BRIEF_TIME_BUDGET: 300
          RADAR_BRIEF_REQUEST_INTERVAL: 4.2
          RADAR_BRIEF_MAX_REQUESTS: 60
          RADAR_BRIEF_MAX_INPUT_TOKENS: 7000
          RADAR_SYNC_MODE: ${{ steps.mode.outputs.mode }}
        run: |
          set +e
          case "$RADAR_SYNC_MODE" in
            manual)
              export RADAR_BRIEF_HISTORY_LIMIT=12
              # A manual dispatch or relevant source-code push is a repair
              # run: actually poll every enabled source even when its normal
              # minimum interval has not elapsed. This remains incremental;
              # it does not trigger a historical OpenAlex replay.
              export RADAR_BYPASS_MINIMUM_INTERVAL=1
              # A source-code push is also the controlled repair path. Retry
              # validation failures immediately after prompt/validator fixes;
              # scheduled runs retain the normal six-hour backoff.
              export RADAR_BRIEF_RETRY_SECONDS=0
              ;;
            academic)
              export RADAR_BRIEF_HISTORY_LIMIT=40
              export RADAR_BRIEF_TIME_BUDGET=1200
              ;;
            monthly)
              # The daily academic job owns historical brief backfill. Avoid a
              # second large model batch on the first day of each month.
              export RADAR_BRIEF_HISTORY_LIMIT=0
              ;;
            *) export RADAR_BRIEF_HISTORY_LIMIT=0 ;;
          esac
          args=(sync --format json)
          if [[ "${{ steps.mode.outputs.full }}" == "true" ]]; then
            args+=(--full)
          fi
          python3 radar.py "${args[@]}" > sync-output.json
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          cat sync-output.json
          counts=$(python3 - <<'PY'
          import json

          report = json.load(open("sync-output.json", encoding="utf-8"))
          print(
              int(report["source_failure_count"]),
              int(report["brief_generation_failure_count"]),
          )
          PY
          )
          read -r source_failures brief_failures <<< "$counts"
          echo "source_failure_count=$source_failures" >> "$GITHUB_OUTPUT"
          echo "brief_failure_count=$brief_failures" >> "$GITHUB_OUTPUT"
          if [[ "$code" -ne 0 && "$code" -ne 2 ]]; then
            echo "::error::radar.py failed before producing a usable partial result (exit $code)"
            exit "$code"
          fi
          if [[ "$code" -eq 2 ]]; then
            echo "::warning::$source_failures research source(s) failed; the partial health state will still be published."
          fi
          if [[ "$brief_failures" -gt 0 ]]; then
            echo "::warning::Professional brief validation rejected one or more items. They remain withheld and will retry automatically; this is not a deployment failure."
          fi

      - name: Compare durable material state
        id: compare
        shell: bash
        env:
          BEFORE: ${{ steps.before.outputs.value }}
        run: |
          set -euo pipefail
          python3 cloud/state_db.py verify data/radar.sqlite3
          after=$(python3 cloud/state_db.py fingerprint data/radar.sqlite3)
          echo "After: $after"
          if [[ "$after" != "$BEFORE" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "fingerprint=$after" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "fingerprint=$after" >> "$GITHUB_OUTPUT"
          fi

      - name: Compact and persist changed database state
        if: steps.compare.outputs.changed == 'true'
        shell: bash
        env:
          EXPECTED_FINGERPRINT: ${{ steps.compare.outputs.fingerprint }}
        run: |
          set -euo pipefail
          python3 cloud/state_db.py compact data/radar.sqlite3
          actual=$(python3 cloud/state_db.py fingerprint data/radar.sqlite3)
          if [[ "$actual" != "$EXPECTED_FINGERPRINT" ]]; then
            echo "::error::Compaction changed the material-state fingerprint"
            exit 1
          fi
          bash cloud/persist_state.sh data/radar.sqlite3 "$actual"

      - name: Prepare public RSS and history site
        run: |
          python3 cloud/publish_site.py \
            --site site \
            --database data/radar.sqlite3 \
            --report reports/latest.json \
            --base-url "$PUBLIC_BASE_URL"
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          for path in ("site/feed.xml", "site/full.xml", "site/subscriptions.opml"):
              ET.parse(path)
              print("valid XML:", path)
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
          retention-days: 1

  deploy:
    needs: sync-and-build
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Check out notifier
        uses: actions/checkout@v6

      - name: Notify WebSub hub after the deployed feeds are public
        continue-on-error: true
        run: |
          python3 cloud/notify_websub.py \
            "${PUBLIC_BASE_URL}full.xml" \
            "${PUBLIC_BASE_URL}feed.xml" \
            "${PUBLIC_BASE_URL}live.xml"

  report-health:
    needs: [sync-and-build, deploy]
    if: always()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Report source and deployment health
        env:
          SYNC_RESULT: ${{ needs.sync-and-build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          SYNC_EXIT: ${{ needs.sync-and-build.outputs.sync_exit }}
          SOURCE_FAILURE_COUNT: ${{ needs.sync-and-build.outputs.source_failure_count }}
          BRIEF_FAILURE_COUNT: ${{ needs.sync-and-build.outputs.brief_failure_count }}
        run: |
          if [[ "$SYNC_RESULT" != "success" || "$DEPLOY_RESULT" != "success" ]]; then
            echo "Build or deployment failed."
            exit 1
          fi
          if [[ "$SYNC_EXIT" != "0" && "$SYNC_EXIT" != "2" ]]; then
            echo "Sync finished with an invalid or missing health exit code: ${SYNC_EXIT:-missing}."
            exit 1
          fi
          if [[ "$SYNC_EXIT" == "2" || "${SOURCE_FAILURE_COUNT:-0}" -gt 0 ]]; then
            echo "The partial result was published, but $SOURCE_FAILURE_COUNT research source(s) failed."
            exit 1
          fi
          if [[ "${BRIEF_FAILURE_COUNT:-0}" -gt 0 ]]; then
            echo "::warning::Professional brief retries remain withheld; source synchronization and deployment succeeded."
          fi
          echo "All research sources synchronized and the public site was deployed."
